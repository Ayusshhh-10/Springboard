{% extends "base.html" %}

{% block content %}

<h2>Candidate Dashboard</h2>

<div class="dashboard-card">
    <h3>Welcome, {{ candidate_name }}</h3>
    <p>You are logged in with:</p>
    <p><strong>{{ candidate_email }}</strong></p>

    <p class="subtitle">
        This dashboard will later be used to start the online exam and show exam-related instructions.
    </p>

    <a class="logout-btn" href="{{ url_for('logout') }}">Logout</a>
</div>

{% endblock %}
